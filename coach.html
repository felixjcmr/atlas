.msg-time{font-size:9px;color:#2a2a2a;margin-top:3px;padding:0 4px;}

.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typing{0%,60%,100%{transform:translateY(0);background:#444;}30%{transform:translateY(-4px);background:#7B72E9;}}

.sug-btn:active{background:#100e2e;border-color:#2e2b6e;color:#7B72E9;}

/* INPUT */

textarea#msg-input{width:100%;background:none;border:none;color:#e8e8e8;font-size:13px;font-family:inherit;outline:none;resize:none;max-height:100px;line-height:1.5;overflow-y:auto;}

.send-btn:disabled{background:#1a1a2e;color:#333;cursor:default;}
.send-btn:active:not(:disabled){transform:scale(0.9);}

/* EMPTY STATE */

<script>
// ── UTILS ──────────────────────────────────────────────────────
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const DAYS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const SEANCES_IDS=['push','pull','lower','repos','chestback','shoulderarms','footing'];
const SEANCES_LABELS={push:'Push',pull:'Pull',lower:'Lower',repos:'Repos',chestback:'Chest/Back',shoulderarms:'Shoulders/Arms',footing:'Footing'};

function dk(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function dow(d){let w=d.getDay();return w===0?6:w-1;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function ls(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function getApiKey(){return localStorage.getItem('anthropic_api_key')||'';}
function fmtTime(){const n=new Date();return n.getHours()+':'+(n.getMinutes()<10?'0':'')+n.getMinutes();}

// ── CONVERSATION HISTORY ───────────────────────────────────────
let conversationHistory = [];
let isThinking = false;

// ── COLLECTER TOUTES LES DONNÉES ──────────────────────────────
function collectAllData(){
  const data = {};

  // Poids 14 jours
  data.poids = [];
  for(let n=0;n<14;n++){
    const d=addDays(TODAY,-n);
    const w=parseFloat(ls('gt5_w_'+dk(d)));
    if(!isNaN(w)&&w>0) data.poids.push({date:dk(d),kg:w,daysAgo:n});
  }

  // Nutrition semaine
  data.nutrition = [];
  for(let n=0;n<7;n++){
    const d=addDays(TODAY,-n);
    const dep=parseInt(ls('gt5_dep_'+dk(d)))||0;
    const gluc=parseInt(ls('gt5_gluc_'+dk(d)))||0;
    const val=!!ls('gt5_val_'+dk(d));
    data.nutrition.push({date:dk(d),dep,gluc,val,daysAgo:n,jour:DAYS[dow(d)]});
  }

  // Sommeil 7 jours
  data.sommeil = [];
  for(let n=0;n<7;n++){
    const d=addDays(TODAY,-n);
    try{
      const sr=ls('rt5_sleep_'+dk(d));
      if(sr){
        const sp=JSON.parse(sr);
        if(sp.dur) data.sommeil.push({
          date:dk(d),
          durMin:sp.dur,
          durH:Math.floor(sp.dur/60)+'h'+(sp.dur%60>0?sp.dur%60+'':''),
          feelSoir:sp.feel_soir||null,
          feelMatin:sp.feel_matin||null,
          daysAgo:n,
          jour:DAYS[dow(d)]
        });
      }
    }catch(e){}
  }

  // Journal 7 jours
  data.journal = [];
  for(let n=0;n<7;n++){
    const d=addDays(TODAY,-n);
    try{
      const jr=ls('rt5_journal_'+dk(d));
      if(jr){
        const jp=JSON.parse(jr);
        if(jp.rating||jp.good||jp.bad) data.journal.push({
          date:dk(d),jour:DAYS[dow(d)],daysAgo:n,
          rating:jp.rating||null,good:jp.good||'',bad:jp.bad||'',
          focus:jp.focus||'',next:jp.next||''
        });
      }
    }catch(e){}
  }

  // Training 14 jours + PRs
  data.training = [];
  data.prs = {};
  const seanceIds=['push','pull','lower','repos','chestback','shoulderarms','footing'];
  for(let n=0;n<14;n++){
    const d=addDays(TODAY,-n);
    const sidIdx=dow(d);
    const sid=seanceIds[sidIdx];
    try{
      const tr=JSON.parse(ls('train_'+dk(d)+'_'+sid)||'null');
      if(tr){
        const exos=[];
        Object.keys(tr).forEach(eid=>{
          if(tr[eid]&&tr[eid].sets&&tr[eid].sets.length){
            const kgs=tr[eid].sets.map(s=>parseFloat(s.kg)||0).filter(k=>k>0);
            const maxKg=kgs.length?Math.max(...kgs):0;
            const reps=tr[eid].sets.map(s=>parseInt(s.reps)||0).filter(r=>r>0);
            const maxReps=reps.length?Math.max(...reps):0;
            exos.push({id:eid,maxKg,maxReps,sets:tr[eid].sets.length});
            // Collecter PRs
            if(!data.prs[eid]||maxKg>data.prs[eid]) data.prs[eid]=maxKg;
          }
        });
        if(exos.length) data.training.push({date:dk(d),sid,label:SEANCES_LABELS[sid],exos,daysAgo:n,jour:DAYS[dow(d)]});
      }
    }catch(e){}
  }

  // Programme complet
  data.programme = {
    split: 'Push (Lun) / Pull (Mar) / Lower+Natation (Mer) / Repos (Jeu) / Chest-Back (Ven) / Shoulders-Arms (Sam) / Footing (Dim)',
    street: 'Street Push lundi soir (4×pompes + 4×3mn corde) · Street Pull mardi soir (4×tractions + 4×3mn sac)',
    push: ['Flat Bench Machine 3×6-8 @140kg','Incline Chest Press 3×8-10 @45kg','Pec Deck 2×échec','Élév. frontale+latérale poulie 2×20+20 dégressive','Overhead Cable Ext V-grip 2×échec','Extension corde 2×échec'],
    pull: ['Lat Pulldown 3×6-8 @80kg (sangles)','Unilatéral High Row 3×8-10 @40kg','One Arm Cable Row 2×10-12','Cable Rear Delt Fly 2×12-15 dégressive','Alternating Biceps Curl 2×dégressive','Rope Hammer Curl 2×dégressive'],
    lower: ['Squat Smith 2×échec @160kg','Leg Extension 3×échec @80kg','Hamstring Curl 3×échec @60kg','Lumbar Extension 2×','Hip Adduction 2×échec'],
    chestback: ['Bench Incline Smith 2×6-8 @40kg/côté','Kelso Shrug 2×6-8','Chest Press 2×6-8','Chest Supported Row 2×6-8 @32kg','Seated Cable Fly 2×10-12','One Arm Cable Row 2×10-12 @40kg'],
    shoulderarms: ['Seated Shoulder Machine 3×6-8 @45kg','Lateral Raises Machine 3×12-15','Reverse Pec Deck 3×15-20','Preacher Curls 2×8-10','Single Arm Push Down 2×8-10','Double Bayesian Curls 2×10-12','Double Triceps Katana 2×10-12','DB Curls×Extension bar 2×échec']
  };

  // Nutrition cible
  data.nutritionCible = {
    proteines: '200g fixes',
    lipides: '100g fixes',
    calories_plancher: 3200,
    formule: 'Glucides = (Dépense - 1790) / 4',
    profil: 'Lean bulk structuré · +0,2 à +0,5 kg/sem'
  };

  return data;
}

  const daySpan = data.poids.length>1?data.poids[data.poids.length-1].daysAgo:1;

  const inZone = weekRate&&parseFloat(weekRate)>=0.15&&parseFloat(weekRate)<=0.55;

  const trackedDays = data.nutrition.filter(d=>d.dep>0);
  const avgDep = trackedDays.length?Math.round(trackedDays.reduce((a,b)=>a+b.dep,0)/trackedDays.length):null;

  const avgSleep = data.sommeil.length?Math.round(data.sommeil.reduce((a,b)=>a+b.durMin,0)/data.sommeil.length):null;
  const avgMood = data.journal.filter(j=>j.rating).length?
    (data.journal.filter(j=>j.rating).reduce((a,b)=>a+b.rating,0)/data.journal.filter(j=>j.rating).length).toFixed(1):null;

  const todayDow = dow(TODAY);
  const todaySid = ['push','pull','lower','repos','chestback','shoulderarms','footing'][todayDow];
  const todaySeance = data.training.find(t=>t.daysAgo===0);
  const nextSid = ['push','pull','lower','repos','chestback','shoulderarms','footing'][(todayDow+1)%7];

  const sys = `<role>

SOMMEIL & RÉCUPÉRATION
— Tu traites le sommeil comme levier #1 de composition corporelle et de performance cognitive.
— Tu identifies les corrélations entre qualité du sommeil, performance en séance, humeur et progression du poids.
— Tu proposes des protocoles concrets calibrés à la situation de Félix.

PSYCHOLOGIE & MENTAL
— Tu lis entre les lignes. Si Félix exprime fatigue, impatience ou découragement, tu le nommes avant de traiter le fond.
— Tu déconstruis les excuses avec précision, sans ménagement inutile (Goggins).
— Tu ancres tes conseils sur des systèmes et des identités, pas sur des objectifs isolés (Clear).
— Tu appliques la dichotomie stoïcienne : énergie sur ce qui est dans le contrôle, clarté sur ce qui ne l'est pas.
— Les plateaux — physiques ou mentaux — sont traités comme phases normales, expliqués biologiquement ou psychologiquement, et suivis d'un ajustement du plan.

DÉVELOPPEMENT PERSONNEL, AMBITION & VIE
— Finances, relations, ambition, vision à long terme : même niveau de précision que l'entraînement. Analyse → pattern → action concrète.
— Tu valorises les décisions à leverage élevé et distingues réversible d'irréversible (Naval, Taleb).
— Tu encourages la responsabilité totale de sa trajectoire, sans excuses extérieures (Peterson, Willink).

STYLE
— Longueur calibrée à la complexité réelle : question simple = réponse courte et percutante. Question complexe = développement structuré.
— Termes techniques exacts quand pertinents (RPE, MEV, surcompensation, dopaminergic drive, etc.).
— Mémoire active de la conversation : tu fais référence à ce qui a été dit plus tôt naturellement.
— Si une information manque, tu poses UNE seule question, ciblée.
</instructions>

// ── CONTEXT BANNER ────────────────────────────────────────────
function renderContextBanner(){
  const data = collectAllData();
  const poidsRecent = data.poids[0];
  const avgDep = data.nutrition.filter(d=>d.dep>0);
  const avgDepVal = avgDep.length?Math.round(avgDep.reduce((a,b)=>a+b.dep,0)/avgDep.length):null;
  const sleepAvg = data.sommeil.length?Math.round(data.sommeil.reduce((a,b)=>a+b.durMin,0)/data.sommeil.length):null;
  const todayDow = dow(TODAY);
  const todaySid = SEANCES_IDS[todayDow];

  const chips = [];
  if(poidsRecent) chips.push({label:'Poids',val:poidsRecent.kg+'kg',cls:''});
  if(avgDepVal) chips.push({label:'Dép. moy.',val:avgDepVal+'kcal',cls:avgDepVal>=3200?'green':'orange'});
  if(sleepAvg) chips.push({label:'Sommeil moy.',val:Math.floor(sleepAvg/60)+'h'+(sleepAvg%60>0?sleepAvg%60:''),cls:sleepAvg>=420?'green':'orange'});
  chips.push({label:'Séance du jour',val:SEANCES_LABELS[todaySid]||'—',cls:''});
  chips.push({label:'Training loggué',val:data.training.find(t=>t.daysAgo===0)?'✓':'—',cls:data.training.find(t=>t.daysAgo===0)?'green':''});

  document.getElementById('ctx-banner').innerHTML = chips.map(c=>
    `<div class="ctx-chip ${c.cls}"><span>${c.val}</span> ${c.label}</div>`
  ).join('');
}

// ── UI HELPERS ────────────────────────────────────────────────
function autoResize(ta){
  ta.style.height='auto';
  ta.style.height=Math.min(ta.scrollHeight,100)+'px';
}

function updateSendBtn(){
  const val=document.getElementById('msg-input').value.trim();
  document.getElementById('send-btn').disabled=!val||isThinking;
}

function scrollToBottom(){
  const m=document.getElementById('messages');
  m.scrollTop=m.scrollHeight;
}

function formatCoachMsg(text){
  return text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/^##\s*(.*)/gm,'<span class="coach-section">$1</span>')
    .replace(/^—\s*/gm,'• ')
    .replace(/\n\n/g,'</p><p style="margin-top:8px;">')
    .replace(/\n/g,'<br>');
}

function addMessage(role, text, time){
  const empty=document.getElementById('empty-state');
  if(empty) empty.remove();

  const msgs=document.getElementById('messages');
  const div=document.createElement('div');
  div.className='msg '+role;

  const bubble=document.createElement('div');
  bubble.className='msg-bubble';
  if(role==='coach'){
    bubble.innerHTML='<p>'+formatCoachMsg(text)+'</p>';
  } else {
    bubble.textContent=text;
  }

  const t=document.createElement('div');
  t.className='msg-time';
  t.textContent=time||fmtTime();

  div.appendChild(bubble);
  div.appendChild(t);
  msgs.appendChild(div);
  scrollToBottom();
  return div;
}

function showTyping(){
  const msgs=document.getElementById('messages');
  const div=document.createElement('div');
  div.className='msg coach';
  div.id='typing-indicator';
  div.innerHTML=`<div class="typing-bubble">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>`;
  msgs.appendChild(div);
  scrollToBottom();
}

function removeTyping(){
  const t=document.getElementById('typing-indicator');
  if(t) t.remove();
}

function setStatus(status){
  const dot=document.getElementById('status-dot');
  const lbl=document.getElementById('status-lbl');
  if(status==='thinking'){
    dot.className='status-dot thinking';
    lbl.textContent='En train de réfléchir…';
  } else {
    dot.className='status-dot';
    lbl.textContent='Prêt';
  }
}

// ── SEND MESSAGE ──────────────────────────────────────────────
async function sendMessage(){
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  if(!text||isThinking) return;

  const apiKey=getApiKey();
  if(!apiKey){
    addMessage('coach','⚙️ Configure ta clé API dans le dashboard (bouton ⚙️ en haut à droite).');
    return;
  }

  // Afficher message user
  addMessage('user', text);
  input.value='';
  input.style.height='auto';
  updateSendBtn();
  document.getElementById('suggestions').style.display='none';

  // Ajouter à l'historique
  conversationHistory.push({role:'user', content:text});

  isThinking=true;
  setStatus('thinking');
  showTyping();

  // Collecter données fraîches à chaque message
  const data=collectAllData();
  const systemPrompt=buildSystemPrompt(data);

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1200,
        system:systemPrompt,
        messages:conversationHistory
      })
    });

    const responseData=await res.json();
    removeTyping();

    if(!res.ok){
      const errMsg=responseData.error?responseData.error.message:'Erreur '+res.status;
      addMessage('coach','Erreur API : '+errMsg);
      conversationHistory.pop();
    } else {
      const reply=responseData.content&&responseData.content[0]?responseData.content[0].text:'';
      conversationHistory.push({role:'assistant',content:reply});
      addMessage('coach', reply);

      // Garder l'historique raisonnable (max 20 échanges)
      if(conversationHistory.length>40){
        conversationHistory=conversationHistory.slice(-30);
      }
    }
  }catch(err){
    removeTyping();
    addMessage('coach','Erreur réseau. Vérifie ta connexion.');
    conversationHistory.pop();
  }

  isThinking=false;
  setStatus('ready');
  updateSendBtn();
}

function sendSuggestion(btn){
  document.getElementById('msg-input').value=btn.textContent;
  updateSendBtn();
  sendMessage();
}

// ── INIT ──────────────────────────────────────────────────────
renderContextBanner();
updateSendBtn();
</script>
