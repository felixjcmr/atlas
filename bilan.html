<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Atlas">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
<title>Bilan Semaine — Félix</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#c0c0c0;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:100px;overscroll-behavior:none;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}
.hdr{padding:16px 18px 12px;border-bottom:0.5px solid #111;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,10,10,0.96);backdrop-filter:blur(10px);z-index:10;}
.hdr-left{display:flex;align-items:center;gap:10px;}
.back-btn{font-size:11px;color:#555;padding:5px 10px;border:0.5px solid #1a1a1a;border-radius:8px;}
.back-btn:active{color:#7B72E9;}
.hdr-title{font-size:18px;font-weight:600;color:#e8e8e8;letter-spacing:-0.02em;}
.hdr-week{font-size:10px;color:#444;margin-top:2px;}
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:0.5px solid #0f0f0f;}
.week-nav-btn{width:32px;height:32px;border:0.5px solid #1a1a1a;border-radius:50%;color:#555;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.week-nav-btn:not(:disabled):active{background:#100e2e;border-color:#2e2b6e;color:#7B72E9;}
.week-nav-btn:disabled{opacity:0.2;cursor:default;}
.week-nav-lbl{font-size:11px;color:#c0c0c0;font-weight:500;}
.score-section{margin:14px 18px 0;background:linear-gradient(135deg,#0f0e1e 0%,#080820 100%);border:0.5px solid #2a2660;border-radius:16px;padding:18px;overflow:hidden;position:relative;}
.score-section::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:radial-gradient(circle,#7B72E925,transparent 70%);border-radius:50%;pointer-events:none;}
.score-label{font-size:9px;color:#444;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;}
.score-row{display:flex;align-items:flex-end;gap:16px;}
.score-left{display:flex;flex-direction:column;align-items:flex-start;}
.score-num{font-size:56px;font-weight:700;line-height:1;letter-spacing:-0.04em;transition:color 0.5s;}
.score-max{font-size:16px;color:#333;font-weight:400;}
.score-qualifier{font-size:10px;margin-top:6px;padding:2px 8px;border-radius:20px;display:inline-block;}
.score-bars{flex:1;display:flex;flex-direction:column;gap:7px;}
.score-bar-row{display:flex;align-items:center;gap:6px;}
.score-bar-lbl{font-size:9px;color:#444;width:56px;text-align:right;flex-shrink:0;}
.score-bar-track{flex:1;height:4px;background:#141414;border-radius:2px;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:2px;width:0;transition:width 0.9s cubic-bezier(0.4,0,0.2,1);}
.score-bar-val{font-size:9px;width:20px;text-align:right;flex-shrink:0;}
.score-trend{margin-top:12px;padding-top:10px;border-top:0.5px solid #141414;font-size:10px;color:#555;}
.section{margin:14px 18px 0;}
.section-title{font-size:9px;color:#333;letter-spacing:0.09em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:0.5px;background:#111;}
.days-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
.day-col{display:flex;flex-direction:column;align-items:center;gap:3px;}
.day-lbl{font-size:8px;color:#2a2a2a;text-transform:uppercase;}
.day-dot{width:30px;height:30px;border-radius:50%;border:0.5px solid #1a1a1a;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;}
.day-dot.ok{border-color:#166534;background:#071a0a;color:#22C55E;box-shadow:0 0 8px #22C55E15;}
.day-dot.partial{border-color:#3a2800;background:#1c1400;color:#F59E0B;}
.day-dot.empty{color:#1a1a1a;}
.day-dot.today{box-shadow:0 0 0 1.5px #7B72E9;}
.day-sub{font-size:7px;color:#2a2a2a;text-align:center;min-height:9px;}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:4px;}
.stat-card{background:#0d0d0d;border:0.5px solid #141414;border-radius:12px;padding:12px 13px;}
.stat-card.good{border-color:#166534;background:#030f06;}
.stat-card.warn{border-color:#3a2800;background:#0d0900;}
.stat-card.highlight{border-color:#2e2b6e;background:#080820;}
.stat-val{font-size:22px;font-weight:600;line-height:1;margin-bottom:4px;}
.stat-lbl{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:0.05em;}
.stat-sub{font-size:9px;color:#2a2a2a;margin-top:3px;}
.chart-card{background:#0d0d0d;border:0.5px solid #141414;border-radius:12px;padding:14px;margin-bottom:8px;}
.chart-title{font-size:10px;color:#555;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.chart-avg{font-size:10px;font-weight:500;}
.chart-wrap{height:80px;position:relative;}
.compare-card{background:#0d0d0d;border:0.5px solid #141414;border-radius:12px;padding:4px 14px;}
.compare-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid #0f0f0f;}
.compare-row:last-child{border-bottom:none;}
.compare-lbl{font-size:10px;color:#555;}
.compare-vals{display:flex;align-items:center;gap:8px;}
.compare-prev{font-size:10px;color:#252525;}
.compare-arr{font-size:12px;font-weight:600;}
.compare-cur{font-size:11px;font-weight:600;}
.insight-card{background:#0d0d0d;border:0.5px solid #141414;border-radius:12px;padding:13px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;}
.insight-card.highlight{border-color:#2e2b6e;background:#080820;}
.insight-card.warn{border-color:#3a2800;background:#0d0900;}
.insight-card.good{border-color:#166534;background:#030f06;}
.insight-ico{font-size:18px;flex-shrink:0;margin-top:1px;}
.insight-title{font-size:11px;font-weight:600;color:#e8e8e8;margin-bottom:3px;}
.insight-text{font-size:11px;color:#666;line-height:1.65;}
.empty-state{text-align:center;padding:40px 20px;grid-column:1/-1;}
.empty-ico{font-size:32px;margin-bottom:10px;}
.empty-title{font-size:13px;font-weight:500;color:#333;margin-bottom:6px;}
.empty-sub{font-size:11px;color:#2a2a2a;line-height:1.6;}
.ai-section{margin:14px 18px 0;}
.ai-card{background:#080820;border:0.5px solid #2e2b6e;border-radius:14px;overflow:hidden;}
.ai-header{padding:14px 16px 12px;border-bottom:0.5px solid #1a1a2e;display:flex;align-items:center;justify-content:space-between;}
.ai-meta{flex:1;}
.ai-title{font-size:12px;font-weight:600;color:#7B72E9;}
.ai-sub{font-size:10px;color:#333;margin-top:2px;}
.ai-btn{background:#7B72E9;color:#fff;padding:8px 16px;border-radius:20px;font-size:11px;font-weight:600;transition:opacity 0.2s;flex-shrink:0;}
.ai-btn:disabled{opacity:0.35;cursor:default;}
.ai-body{padding:14px 16px;}
.ai-loader{text-align:center;padding:20px;font-size:11px;color:#555;display:none;}
.ai-loader-ico{font-size:22px;display:inline-block;animation:spin 1s linear infinite;margin-bottom:8px;}
.ai-result{font-size:11px;color:#c0c0c0;line-height:1.8;display:none;}
.ai-result .ai-h{font-size:9px;color:#7B72E9;letter-spacing:0.09em;text-transform:uppercase;margin:14px 0 5px;font-weight:700;display:block;padding-bottom:4px;border-bottom:0.5px solid #1a1a2e;}
.ai-result .ai-h:first-child{margin-top:0;}
.ai-result p{margin-bottom:8px;color:#aaa;}
.ai-result strong{color:#e8e8e8;font-weight:600;}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:rgba(10,10,10,0.97);backdrop-filter:blur(12px);border-top:0.5px solid #1a1a1a;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 10px;cursor:pointer;min-width:0;}
.bn-ico{font-size:17px;line-height:1;}
.bn-lbl{font-size:7px;color:#333;letter-spacing:0.03em;text-transform:uppercase;margin-top:2px;}
.bn.active .bn-lbl{color:#7B72E9;}
.bn.active .bn-ico{filter:drop-shadow(0 0 5px #7B72E9);}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <button class="back-btn" onclick="location.href='dashboard.html'">← Retour</button>
  </div>
  <div>
    <div class="hdr-title">Bilan Semaine</div>
    <div class="hdr-week" id="hdr-week">—</div>
  </div>
  <div style="width:60px;"></div>
</div>

<div class="week-nav">
  <button class="week-nav-btn" id="btn-prev-week" onclick="shiftWeek(-1)">‹</button>
  <div class="week-nav-lbl" id="week-nav-lbl">—</div>
  <button class="week-nav-btn" id="btn-next-week" onclick="shiftWeek(1)" disabled>›</button>
</div>

<div class="score-section">
  <div class="score-label">Score de la semaine</div>
  <div class="score-row">
    <div class="score-left">
      <div><span class="score-num" id="score-num">—</span><span class="score-max">/10</span></div>
      <div class="score-qualifier" id="score-qualifier"></div>
    </div>
    <div class="score-bars" id="score-bars"></div>
  </div>
  <div class="score-trend" id="score-trend"></div>
</div>

<div class="section">
  <div class="section-title">Jours de la semaine</div>
  <div class="days-strip" id="days-strip"></div>
</div>

<div class="section">
  <div class="section-title">Chiffres clés</div>
  <div class="stats-grid" id="stats-grid"></div>
</div>

<div class="section">
  <div class="section-title">Dépense calorique</div>
  <div class="chart-card">
    <div class="chart-title"><span>Kcal / jour</span><span class="chart-avg" id="dep-avg-lbl" style="color:#7B72E9;"></span></div>
    <div class="chart-wrap"><canvas id="chart-dep"></canvas></div>
  </div>
</div>

<div class="section">
  <div class="section-title">Sommeil</div>
  <div class="chart-card">
    <div class="chart-title"><span>Heures / nuit</span><span class="chart-avg" id="sleep-avg-lbl" style="color:#60A5FA;"></span></div>
    <div class="chart-wrap"><canvas id="chart-sleep"></canvas></div>
  </div>
</div>

<div class="section">
  <div class="section-title">Poids</div>
  <div class="chart-card">
    <div class="chart-title"><span>Évolution kg</span><span class="chart-avg" id="poids-delta-lbl"></span></div>
    <div class="chart-wrap" id="chart-poids-wrap"><canvas id="chart-poids"></canvas></div>
  </div>
</div>

<div class="section" id="compare-section" style="display:none;">
  <div class="section-title">vs Semaine précédente</div>
  <div class="compare-card" id="compare-content"></div>
</div>

<div class="section">
  <div class="section-title">Insights</div>
  <div id="insights-container"></div>
</div>

<div class="ai-section">
  <div class="ai-card">
    <div class="ai-header">
      <div class="ai-meta">
        <div class="ai-title">✦ Analyse Claude</div>
        <div class="ai-sub">Lecture approfondie de ta semaine</div>
      </div>
      <button class="ai-btn" id="btn-ai" onclick="genererAnalyse()">Générer</button>
    </div>
    <div class="ai-body">
      <div class="ai-loader" id="ai-loader">
        <div class="ai-loader-ico">⟳</div>
        <div>Analyse en cours…</div>
      </div>
      <div class="ai-result" id="ai-result"></div>
    </div>
  </div>
</div>

<div style="height:20px;"></div>

<div class="bnav">
  <div class="bn" onclick="location.href='dashboard.html'"><div class="bn-ico">⊞</div><div class="bn-lbl">Home</div></div>
  <div class="bn" onclick="location.href='glucide_tracker.html'"><div class="bn-ico">⚡</div><div class="bn-lbl">Énergie</div></div>
  <div class="bn" onclick="location.href='carburant.html'"><div class="bn-ico">🌿</div><div class="bn-lbl">Aliments</div></div>
  <div class="bn" onclick="location.href='training.html'"><div class="bn-ico">🏋️</div><div class="bn-lbl">Training</div></div>
  <div class="bn" onclick="location.href='routine.html'"><div class="bn-ico">🗓</div><div class="bn-lbl">Routine</div></div>
</div>

<script>
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const SFR=['L','M','M','J','V','S','D'];
const DAYS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const SEANCES_IDS=['push','pull','lower','repos','chestback','shoulderarms','footing'];
const FLOOR=3200,FIXED=1700;
function dk(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function dow(d){const w=d.getDay();return w===0?6:w-1;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function ls(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function fmt(n){return Math.round(n).toLocaleString('fr-FR');}
function getApiKey(){return localStorage.getItem('anthropic_api_key')||'';}
function fmtSleep(m){return Math.floor(m/60)+'h'+(m%60>0?String(m%60).padStart(2,'0'):'');}

let currentMonday=getMonday(TODAY);
const charts={};

function getMonday(d){const m=new Date(d);m.setDate(d.getDate()-dow(d));m.setHours(0,0,0,0);return m;}
function shiftWeek(n){const next=addDays(currentMonday,n*7);if(next>TODAY)return;currentMonday=next;render();}

function collectWeek(monday){
  const days=[];
  for(let i=0;i<7;i++){
    const d=addDays(monday,i);
    const dep=parseInt(ls('gt5_dep_'+dk(d)))||0;
    const gluc=parseInt(ls('gt5_gluc_'+dk(d)))||0;
    const poids=parseFloat(ls('gt5_w_'+dk(d)))||null;
    const val=!!ls('gt5_val_'+dk(d));
    const isFuture=d>TODAY;
    let sleep=null,feelMatin=null,feelSoir=null;
    try{const sr=ls('rt5_sleep_'+dk(d));if(sr){const sp=JSON.parse(sr);sleep=sp.dur||null;feelMatin=sp.feel_matin||null;feelSoir=sp.feel_soir||null;}}catch(e){}
    let jRating=null,jGood='',jBad='',jFocus='';
    try{const jr=ls('rt5_journal_'+dk(d));if(jr){const jp=JSON.parse(jr);jRating=jp.rating||null;jGood=jp.good||'';jBad=jp.bad||'';jFocus=jp.focus||'';}}catch(e){}
    const sid=SEANCES_IDS[i];
    let exosDone=0,exosTotal=0;
    try{const tr=JSON.parse(ls('train_'+dk(d)+'_'+sid)||'null');if(tr){Object.keys(tr).forEach(k=>{if(tr[k]&&tr[k].sets){exosTotal++;if(tr[k].sets.some(s=>s.done||s.kg||s.reps))exosDone++;}});}}catch(e){}
    // Macros réels depuis Carburant
    let kcalReel=0,pReel=0,lReel=0,gReel=0;
    try{const snap=JSON.parse(ls('carb_'+dk(d)+'_plan')||'null');if(snap&&snap.k){kcalReel=snap.k;pReel=snap.p||0;lReel=snap.l||0;gReel=snap.g||0;}}catch(e){}
    days.push({d,i,dep,gluc,poids,val,sleep,feelMatin,feelSoir,jRating,jGood,jBad,jFocus,exosDone,exosTotal,sid,isFuture,kcalReel,pReel,lReel,gReel});
  }
  return days;
}
function collectWeekPrev(monday){return collectWeek(addDays(monday,-7));}

function calcScore(days){
  const past=days.filter(d=>!d.isFuture);
  if(!past.length)return{total:0,details:[]};
  const pw=past.filter(d=>d.poids).map(d=>d.poids);
  let leanScore=20;
  if(pw.length>=2){const delta=pw[pw.length-1]-pw[0];const rate=delta/pw.length*7;if(rate>=0.15&&rate<=0.55)leanScore=40;else if(rate>=0.05&&rate<=0.7)leanScore=25;else if(rate>0&&rate<=1.0)leanScore=12;else if(rate<0)leanScore=5;else leanScore=0;}
  // Énergie : préférer les kcal réellement mangés (carburant) à la dépense cible
  const tracked=past.filter(d=>d.dep>0||d.kcalReel>0);
  let energyScore=0;
  if(tracked.length>0){
    const avg=tracked.reduce((a,b)=>a+(b.kcalReel>0?b.kcalReel:b.dep),0)/tracked.length;
    if(avg>=3800)energyScore=35;else if(avg>=3500)energyScore=28;else if(avg>=3200)energyScore=20;else if(avg>=2800)energyScore=10;else energyScore=5;
    if(tracked.length>=5&&energyScore>0)energyScore=Math.min(35,energyScore+5);
  }
  const sn=past.filter(d=>d.sleep);
  let sleepScore=0;
  if(sn.length>=3){const avg=sn.reduce((a,b)=>a+b.sleep,0)/sn.length;if(avg>=480)sleepScore=25;else if(avg>=420)sleepScore=18;else if(avg>=360)sleepScore=10;else sleepScore=4;}
  else if(sn.length>0){const avg=sn.reduce((a,b)=>a+b.sleep,0)/sn.length;sleepScore=avg>=480?18:avg>=420?12:6;}
  const total=Math.min(10,Math.max(0,Math.round((leanScore+energyScore+sleepScore)/10)));
  return{total,details:[{lbl:'Lean bulk',score:leanScore,max:40,color:'#22C55E'},{lbl:'Énergie',score:energyScore,max:35,color:'#7B72E9'},{lbl:'Sommeil',score:sleepScore,max:25,color:'#60A5FA'}]};
}

function render(){
  const days=collectWeek(currentMonday);
  const prevDays=collectWeekPrev(currentMonday);
  const sunday=addDays(currentMonday,6);
  const isCurrent=dk(currentMonday)===dk(getMonday(TODAY));
  document.getElementById('btn-next-week').disabled=isCurrent;
  document.getElementById('week-nav-lbl').textContent=currentMonday.toLocaleDateString('fr-FR',{day:'numeric',month:'long'})+' — '+sunday.toLocaleDateString('fr-FR',{day:'numeric',month:'long'});
  document.getElementById('hdr-week').textContent='Semaine du '+currentMonday.toLocaleDateString('fr-FR',{day:'numeric',month:'long'});
  const hasData=days.filter(d=>!d.isFuture).some(d=>d.dep>0||d.kcalReel>0||d.poids||d.sleep||d.exosDone>0);
  renderScore(days,prevDays);
  renderDaysStrip(days);
  if(!hasData&&isCurrent){
    document.getElementById('stats-grid').innerHTML='<div class="empty-state"><div class="empty-ico">📊</div><div class="empty-title">Aucune donnée cette semaine</div><div class="empty-sub">Commence à remplir ton tracker Énergie et tes séances pour voir ton bilan.</div></div>';
    document.getElementById('insights-container').innerHTML='';
  } else {
    renderStats(days,prevDays);
    renderInsights(days,prevDays);
  }
  renderCharts(days);
  renderCompare(days,prevDays);
  const saved=JSON.parse(ls('bilan_ai_'+dk(currentMonday))||'null');
  const aiResult=document.getElementById('ai-result');
  const aiBtn=document.getElementById('btn-ai');
  if(saved&&saved.html){aiResult.innerHTML=saved.html;aiResult.style.display='block';aiBtn.textContent='Regénérer';}
  else{aiResult.style.display='none';aiBtn.textContent='Générer';}
}

function renderScore(days,prevDays){
  const s=calcScore(days);const sp=calcScore(prevDays);
  const col=s.total>=8?'#22C55E':s.total>=6?'#7B72E9':s.total>=4?'#F59E0B':'#EF4444';
  const quals={10:'Semaine d\'élite',9:'Semaine d\'élite',8:'Très bonne semaine',7:'Très bonne semaine',6:'Semaine correcte',5:'Semaine correcte',4:'Semaine difficile',3:'Semaine difficile',2:'Peu de données',1:'Peu de données',0:'Peu de données'};
  const qualBg=s.total>=8?'#071a0a':s.total>=6?'#0a0820':s.total>=4?'#1c1400':'#1a0808';
  document.getElementById('score-num').textContent=s.total||'—';
  document.getElementById('score-num').style.color=col;
  const qEl=document.getElementById('score-qualifier');
  qEl.textContent=quals[s.total]||'';qEl.style.background=qualBg;qEl.style.color=col;qEl.style.border='0.5px solid '+col+'44';
  document.getElementById('score-bars').innerHTML=s.details.map(d=>`<div class="score-bar-row"><div class="score-bar-lbl">${d.lbl}</div><div class="score-bar-track"><div class="score-bar-fill" data-w="${Math.round(d.score/d.max*100)}" style="background:${d.color};width:0%;"></div></div><div class="score-bar-val" style="color:${d.color};">${d.score}</div></div>`).join('');
  requestAnimationFrame(()=>requestAnimationFrame(()=>document.querySelectorAll('.score-bar-fill').forEach(el=>{el.style.width=el.dataset.w+'%';})));
  const diff=s.total-sp.total;const trendEl=document.getElementById('score-trend');
  if(sp.total>0){const sign=diff>=0?'+':'';const tcol=diff>0?'#22C55E':diff<0?'#EF4444':'#555';const arr=diff>0?'↑':diff<0?'↓':'→';trendEl.innerHTML=`<span style="color:${tcol};font-weight:600;">${arr} ${sign}${diff} pt${Math.abs(diff)>1?'s':''} vs semaine précédente</span> <span style="color:#333;">· préc. : ${sp.total}/10</span>`;}
  else trendEl.innerHTML='<span style="color:#2a2a2a;">Première semaine trackée</span>';
}

function renderDaysStrip(days){
  document.getElementById('days-strip').innerHTML=days.map(d=>{
    let cls='day-dot',inner=SFR[d.i];
    if(d.isFuture){cls+=' empty';}else if(d.val){cls+=' ok';inner='✓';}else if(d.dep>0||d.kcalReel>0||d.exosDone>0){cls+=' partial';}else{cls+=' empty';}
    if(dk(d.d)===dk(TODAY))cls+=' today';
    const _kcal=d.kcalReel>0?d.kcalReel:d.dep;const sub=_kcal>0?(_kcal>=1000?(_kcal/1000).toFixed(1)+'k':String(_kcal)):'';
    return`<div class="day-col"><div class="day-lbl">${DAYS[d.i].substring(0,3)}</div><div class="${cls}" style="${d.isFuture?'opacity:0.15':''}">${inner}</div><div class="day-sub">${sub}</div></div>`;
  }).join('');
}

function renderStats(days,prevDays){
  const past=days.filter(d=>!d.isFuture&&(d.dep>0||d.kcalReel>0));
  const prevPast=prevDays.filter(d=>d.dep>0||d.kcalReel>0);
  const avgDep=past.length?Math.round(past.reduce((a,b)=>a+(b.kcalReel>0?b.kcalReel:b.dep),0)/past.length):0;
  const prevAvgDep=prevPast.length?Math.round(prevPast.reduce((a,b)=>a+(b.kcalReel>0?b.kcalReel:b.dep),0)/prevPast.length):0;
  const sleepN=days.filter(d=>!d.isFuture&&d.sleep);
  const avgSleep=sleepN.length?Math.round(sleepN.reduce((a,b)=>a+b.sleep,0)/sleepN.length):0;
  const trainDays=days.filter(d=>!d.isFuture&&d.exosDone>0).length;
  const pw=days.filter(d=>!d.isFuture&&d.poids).map(d=>d.poids);
  const delta=pw.length>=2?(pw[pw.length-1]-pw[0]).toFixed(2):null;
  const pf=delta!==null?parseFloat(delta):null;
  const pInZone=pf!==null&&pf>=0.15&&pf<=0.55;
  const pTooFast=pf!==null&&pf>0.55;
  const depDiff=avgDep&&prevAvgDep?avgDep-prevAvgDep:null;
  const cards=[
    {val:avgDep?fmt(avgDep)+' kcal':'—',lbl:'Dépense moy.',sub:depDiff!==null?(depDiff>=0?'+':'')+fmt(depDiff)+' kcal vs préc.':'',col:avgDep>=3800?'#22C55E':avgDep>=3200?'#7B72E9':avgDep>0?'#F59E0B':'#2a2a2a',cls:avgDep>=3200?'good':avgDep>0?'warn':''},
    {val:avgSleep?fmtSleep(avgSleep):'—',lbl:'Sommeil moy.',sub:sleepN.length+' nuit'+(sleepN.length>1?'s':'')+' trackée'+(sleepN.length>1?'s':''),col:avgSleep>=480?'#22C55E':avgSleep>=420?'#F59E0B':avgSleep>0?'#EF4444':'#2a2a2a',cls:avgSleep>=480?'good':avgSleep>0?'warn':''},
    {val:trainDays+' séance'+(trainDays>1?'s':''),lbl:'Entraînements',sub:'sur 7 jours',col:trainDays>=4?'#22C55E':trainDays>=2?'#7B72E9':'#F59E0B',cls:trainDays>=4?'good':'highlight'},
    {val:delta!==null?(pf>=0?'+':'')+delta+'kg':'—',lbl:'Δ Poids semaine',sub:'zone : +0,2 → +0,5 kg',col:pInZone?'#22C55E':pTooFast?'#EF4444':pf!==null?'#F59E0B':'#2a2a2a',cls:pInZone?'good':pTooFast?'warn':pf!==null&&pf<0?'warn':''},
  ];
  document.getElementById('stats-grid').innerHTML=cards.map(c=>`<div class="stat-card ${c.cls}"><div class="stat-val" style="color:${c.col};">${c.val}</div><div class="stat-lbl">${c.lbl}</div>${c.sub?`<div class="stat-sub">${c.sub}</div>`:''}</div>`).join('');
}

function renderCharts(days){
  const labels=days.map(d=>DAYS[d.i].substring(0,3));
  const depData=days.map(d=>d.isFuture?null:d.dep||null);
  const depVals=depData.filter(Boolean);
  const avgD=depVals.length?Math.round(depVals.reduce((a,b)=>a+b,0)/depVals.length):0;
  document.getElementById('dep-avg-lbl').textContent=avgD?'moy. '+fmt(avgD)+' kcal':'';
  renderBarChart('chart-dep',labels,depData,'#7B72E9',FLOOR);
  const slData=days.map(d=>d.isFuture?null:(d.sleep?Math.round(d.sleep/60*10)/10:null));
  const slVals=slData.filter(Boolean);
  const avgSl=slVals.length?Math.round(slVals.reduce((a,b)=>a+b,0)/slVals.length*10)/10:0;
  document.getElementById('sleep-avg-lbl').textContent=avgSl?'moy. '+avgSl+'h':'';
  renderBarChart('chart-sleep',labels,slData,'#60A5FA',8);
  const pData=days.map(d=>d.isFuture?null:d.poids||null);
  const pVals=pData.filter(Boolean);
  if(pVals.length>=2){const delta=(pVals[pVals.length-1]-pVals[0]).toFixed(2);const pf=parseFloat(delta);const dcol=pf>=0.15&&pf<=0.55?'#22C55E':pf>0.55?'#EF4444':'#F59E0B';document.getElementById('poids-delta-lbl').innerHTML=`<span style="color:${dcol};font-weight:600;">${pf>=0?'+':''}${delta} kg</span>`;}
  else document.getElementById('poids-delta-lbl').innerHTML='';
  renderLineChart('chart-poids','chart-poids-wrap',labels,pData,'#22C55E');
}

function renderBarChart(id,labels,data,color,target){
  if(charts[id]){charts[id].destroy();delete charts[id];}
  const ctx=document.getElementById(id);if(!ctx)return;
  const valid=data.filter(Boolean);const mx=Math.max(...valid,target||0)*1.12||1;
  charts[id]=new Chart(ctx,{type:'bar',data:{labels,datasets:[{data,backgroundColor:data.map(v=>v?color+'88':color+'0D'),borderColor:data.map(v=>v?color:'transparent'),borderWidth:1,borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},plugins:{legend:{display:false},tooltip:{backgroundColor:'#111',borderColor:'#222',borderWidth:1,bodyColor:'#c0c0c0',callbacks:{label:c=>c.raw?(id.includes('sleep')?c.raw+'h':fmt(c.raw)+' kcal'):''}}}  ,scales:{x:{grid:{display:false},ticks:{color:'#2a2a2a',font:{size:8}}},y:{display:false,max:mx}}}});
}

function renderLineChart(id,wrapId,labels,data,color){
  if(charts[id]){charts[id].destroy();delete charts[id];}
  const wrap=document.getElementById(wrapId);const ctx=document.getElementById(id);
  const valid=data.filter(Boolean);
  if(valid.length===0){if(wrap)wrap.innerHTML='<div style="font-size:10px;color:#2a2a2a;text-align:center;padding:22px 0;">Aucune mesure poids cette semaine</div>';return;}
  if(valid.length===1){if(wrap)wrap.innerHTML=`<div style="text-align:center;padding:14px 0;"><div style="font-size:26px;font-weight:700;color:${color};">${valid[0]} kg</div><div style="font-size:10px;color:#444;margin-top:4px;">1 mesure cette semaine</div></div>`;return;}
  if(!ctx)return;
  const mn=Math.min(...valid)-0.3,mx=Math.max(...valid)+0.3;
  charts[id]=new Chart(ctx,{type:'line',data:{labels,datasets:[{data,borderColor:color,backgroundColor:color+'15',borderWidth:2.5,pointRadius:data.map(v=>v?5:0),pointBackgroundColor:color,pointBorderColor:'#0a0a0a',pointBorderWidth:2,tension:0.4,fill:true,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},plugins:{legend:{display:false},tooltip:{backgroundColor:'#111',borderColor:'#222',borderWidth:1,bodyColor:'#c0c0c0',callbacks:{label:c=>c.raw?c.raw+' kg':''}}},scales:{x:{grid:{display:false},ticks:{color:'#2a2a2a',font:{size:8}}},y:{display:false,min:mn,max:mx}}}});
}

function renderCompare(days,prevDays){
  const hasData=prevDays.some(d=>d.dep>0||d.sleep||d.poids);
  const sec=document.getElementById('compare-section');
  if(!hasData){sec.style.display='none';return;}sec.style.display='block';
  const aD=v=>{const f=v.filter(d=>d.dep>0);return f.length?f.reduce((a,b)=>a+b.dep,0)/f.length:0;};
  const aS=v=>{const f=v.filter(d=>d.sleep);return f.length?f.reduce((a,b)=>a+b.sleep,0)/f.length:0;};
  const tC=v=>v.filter(d=>d.exosDone>0).length;
  const fS=v=>{const a=aS(v);return a?fmtSleep(Math.round(a)):'—';};
  const rows=[
    {lbl:'Dépense moy.',cur:aD(days)>0?fmt(Math.round(aD(days)))+' kcal':'—',prev:aD(prevDays)>0?fmt(Math.round(aD(prevDays)))+' kcal':'—',diff:aD(days)-aD(prevDays),valid:aD(days)>0&&aD(prevDays)>0},
    {lbl:'Sommeil moy.',cur:fS(days),prev:fS(prevDays),diff:aS(days)-aS(prevDays),valid:aS(days)>0&&aS(prevDays)>0},
    {lbl:'Séances',cur:tC(days),prev:tC(prevDays),diff:tC(days)-tC(prevDays),valid:true},
  ];
  document.getElementById('compare-content').innerHTML=rows.map(r=>{
    if(!r.valid)return'';const up=r.diff>0,eq=r.diff===0;const col=eq?'#555':up?'#22C55E':'#EF4444';const arr=eq?'→':up?'↑':'↓';
    return`<div class="compare-row"><div class="compare-lbl">${r.lbl}</div><div class="compare-vals"><div class="compare-prev">${r.prev}</div><div class="compare-arr" style="color:${col};">${arr}</div><div class="compare-cur" style="color:${col};">${r.cur}</div></div></div>`;
  }).join('');
}

function renderInsights(days,prevDays){
  const insights=[];const past=days.filter(d=>!d.isFuture);
  const trainWithSleep=past.filter(d=>d.exosDone>0&&d.sleep);
  const restWithSleep=past.filter(d=>d.exosDone===0&&d.sleep&&d.sid!=='repos');
  if(trainWithSleep.length>=2&&restWithSleep.length>=1){
    const a=trainWithSleep.reduce((s,d)=>s+d.sleep,0)/trainWithSleep.length;
    const b=restWithSleep.reduce((s,d)=>s+d.sleep,0)/restWithSleep.length;
    const diff=(a-b)/60;
    if(Math.abs(diff)>=0.3)insights.push({ico:'💤',type:'highlight',title:'Sommeil & entraînement',text:`Tu dors en moyenne ${Math.abs(diff).toFixed(1)}h ${diff>0?'de plus':'de moins'} les nuits après séance. ${diff<0?'La fatigue post-training réduit ton sommeil — décale l\'heure de coucher les soirs de training.':'Bonne récupération post-séance.'}`});
  }
  const withBoth=past.filter(d=>d.jRating&&d.sleep);
  if(withBoth.length>=3){const lowBoth=withBoth.filter(d=>d.jRating<=2&&d.sleep<420).length;if(lowBoth>=2)insights.push({ico:'🧠',type:'warn',title:'Humeur & sommeil liés',text:`${lowBoth} jours avec humeur basse ET sommeil <7h. Corrélation directe : manque de sommeil = état mental dégradé. Coucher avant 23h cette semaine.`});}
  const pw=past.filter(d=>d.poids).map(d=>d.poids);
  if(pw.length>=2){
    const delta=pw[pw.length-1]-pw[0];const rate=delta/pw.length*7;
    if(rate>0.55)insights.push({ico:'⚡',type:'warn',title:'Prise de poids rapide',text:`+${delta.toFixed(1)}kg — rythme estimé +${rate.toFixed(2)}kg/sem. Au-dessus de la zone lean bulk. Réduis les glucides de 30-50g sur les jours d'entraînement léger.`});
    else if(rate>=0.15&&rate<=0.55)insights.push({ico:'✅',type:'good',title:'Lean bulk dans la zone',text:`+${delta.toFixed(1)}kg — rythme ${rate.toFixed(2)}kg/sem, exactement dans la zone optimale. Maintiens ton niveau calorique actuel.`});
    else if(delta<0)insights.push({ico:'📉',type:'warn',title:'Perte de masse',text:`${delta.toFixed(1)}kg cette semaine. Déficit calorique probable. Ajoute 100-150g de glucides les jours de muscu lourd.`});
    else if(rate<0.15&&rate>=0)insights.push({ico:'⚠️',type:'warn',title:'Progression trop lente',text:`+${delta.toFixed(1)}kg — sous la zone lean bulk (+0,2kg min/sem). Augmente légèrement les glucides sur les jours de training.`});
  }
  const tracked2=past.filter(d=>d.dep>0);
  if(tracked2.length>=4&&pw.length>=3){
    const avgDep2=tracked2.reduce((a,b)=>a+b.dep,0)/tracked2.length;
    const delta2=pw[pw.length-1]-pw[0];
    if(avgDep2>=3600&&delta2<0.1)insights.push({ico:'🔍',type:'highlight',title:'Dépense élevée, poids stagnant',text:`Dépense moy. ${fmt(Math.round(avgDep2))} kcal. Poids quasi stable — surveille les apports réels sur Yazio.`});
  }
  const ratings=past.filter(d=>d.jRating).map(d=>d.jRating);
  if(ratings.length>=3){const avg=ratings.reduce((a,b)=>a+b,0)/ratings.length;if(avg<3&&!insights.some(i=>i.title.includes('sommeil')))insights.push({ico:'🧠',type:'warn',title:'Fatigue mentale',text:`Humeur moyenne ${avg.toFixed(1)}/5. La fatigue mentale réduit la qualité des séances et la progression. Identifie la source.`});}
  const muscuD=past.filter(d=>!['repos','footing'].includes(d.sid));
  const muscuDone=muscuD.filter(d=>d.exosDone>0);
  if(muscuD.length>=3&&muscuDone.length===muscuD.length)insights.push({ico:'🔥',type:'good',title:'Assiduité parfaite',text:`${muscuDone.length}/${muscuD.length} séances muscu réalisées. La constance est le levier #1 de progression long terme.`});
  const missing=past.filter(d=>d.dep===0);
  if(missing.length>=3)insights.push({ico:'📊',type:'',title:'Tracking incomplet',text:`${missing.length} jours sans données de dépense (${missing.map(d=>DAYS[d.i].substring(0,3)).join(', ')}). Un tracking quotidien rend l'analyse plus précise.`});
  if(!insights.length)insights.push({ico:'📈',type:'',title:'Continue à alimenter tes données',text:'Poids, dépense calorique et sommeil quotidiens permettront d\'afficher des insights pertinents sur ta progression.'});
  document.getElementById('insights-container').innerHTML=insights.map(ins=>`<div class="insight-card ${ins.type}"><div class="insight-ico">${ins.ico}</div><div style="flex:1;"><div class="insight-title">${ins.title}</div><div class="insight-text">${ins.text}</div></div></div>`).join('');
}

async function genererAnalyse(){
  const apiKey=getApiKey();
  if(!apiKey){document.getElementById('ai-result').innerHTML='<span style="color:#EF4444;">⚙️ Configure ta clé API dans le dashboard.</span>';document.getElementById('ai-result').style.display='block';return;}
  const btn=document.getElementById('btn-ai');btn.disabled=true;
  document.getElementById('ai-loader').style.display='block';document.getElementById('ai-result').style.display='none';
  const days=collectWeek(currentMonday);const prevDays=collectWeekPrev(currentMonday);
  const score=calcScore(days);const prevScore=calcScore(prevDays);
  const tracked=days.filter(d=>!d.isFuture&&d.dep>0);
  const avgDepTrack=tracked.length?Math.round(tracked.reduce((a,b)=>a+b.dep,0)/tracked.length):3500;
  const nonTracked=days.filter(d=>!d.isFuture&&d.dep===0).length;
  let ctx=`PROFIL : Félix — 19 ans, 189cm, lean bulk. Objectif : +0,2 à +0,5kg/sem. Protéines 200g fixes, lipides 100g fixes, glucides = (dep-1700)/4, plancher 3200 kcal.
NOTE : Félix suit sa nutrition sur Yazio (app externe). L'absence de données alimentaires dans cette app est NORMALE et intentionnelle — ne jamais le mentionner comme un problème ou un manque.\n\n`;
  ctx+=`SCORE : ${score.total}/10 | Lean bulk: ${score.details[0]?.score||0}/40 | Énergie: ${score.details[1]?.score||0}/35 | Sommeil: ${score.details[2]?.score||0}/25\n`;
  if(prevScore.total>0)ctx+=`Score semaine précédente : ${prevScore.total}/10\n`;
  ctx+=`\nDONNÉES :\n`;
  days.filter(d=>!d.isFuture).forEach(d=>{
    ctx+=`${DAYS[d.i]} : `;const parts=[];
    if(d.poids)parts.push(`poids ${d.poids}kg`);
    if(d.sleep)parts.push(`sommeil ${fmtSleep(d.sleep)}${d.feelMatin?` (matin ${d.feelMatin}/5)`:''}`);
    if(d.jRating){parts.push(`humeur ${d.jRating}/5`);if(d.jGood)parts.push(`✓ "${d.jGood.substring(0,50)}"`);if(d.jBad)parts.push(`✗ "${d.jBad.substring(0,50)}"`);}
    if(d.exosDone>0)parts.push(`séance ${d.sid} (${d.exosDone} exos)`);
    if(d.dep>0)parts.push(`dépense estimée ${d.dep} kcal · ${d.gluc}g glucides cibles`);
    if(d.val)parts.push(`validé ✓`);
    ctx+=parts.join(' · ')+'\n';
  });
  const pPast=prevDays.filter(d=>d.dep>0);
  if(pPast.length){
    const pAvgDep=Math.round(pPast.reduce((a,b)=>a+b.dep,0)/pPast.length);
    const pTrains=prevDays.filter(d=>d.exosDone>0).length;
    const pSN=prevDays.filter(d=>d.sleep);const pAvgSl=pSN.length?Math.round(pSN.reduce((a,b)=>a+b.sleep,0)/pSN.length):0;
    const pPw=prevDays.filter(d=>d.poids).map(d=>d.poids);const pDelta=pPw.length>=2?(pPw[pPw.length-1]-pPw[0]).toFixed(1):null;
    ctx+=`\nSEM. PRÉCÉDENTE : ${pAvgDep} kcal moy. · ${pTrains} séances${pAvgSl?` · sommeil ${fmtSleep(pAvgSl)}`:''}${pDelta?` · poids ${parseFloat(pDelta)>=0?'+':''}${pDelta}kg`:''} · score ${prevScore.total}/10\n`;
  }
  const prompt=ctx+`\nTu es coach expert en bodybuilding naturel et nutrition. Analyse PROFONDE et PERSONNALISÉE basée exclusivement sur ces données réelles.\n\nStructure OBLIGATOIRE (titres exacts) :\n\n## LECTURE DE LA SEMAINE\nSynthèse narrative : qu'est-ce qui s'est passé, quelle tendance globale, bonne ou mauvaise semaine et pourquoi concrètement ?\n\n## CORRÉLATIONS DÉTECTÉES\nLiens non-évidents entre variables. Chiffres exacts. Minimum 2 corrélations si données suffisantes.\n\n## POINT D'ATTENTION\nUne seule chose — la plus importante. Ultra précis, chiffré si possible.\n\n## LEVIER SEMAINE PROCHAINE\nUne seule action concrète et mesurable, avec chiffre cible.\n\nRègles : zéro généralité, zéro flatterie, ton direct de coach expert.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1100,messages:[{role:'user',content:prompt}]})});
    const responseData=await res.json();
    if(!res.ok){document.getElementById('ai-result').innerHTML=`<span style="color:#EF4444;">Erreur API : ${responseData.error?responseData.error.message:'Erreur '+res.status}</span>`;document.getElementById('ai-result').style.display='block';document.getElementById('ai-loader').style.display='none';btn.disabled=false;btn.textContent='Regénérer';return;}
    const text=responseData.content&&responseData.content[0]?responseData.content[0].text:'';
    const html=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/^##\s*(.*)/gm,'<span class="ai-h">$1</span>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
    const finalHtml='<p>'+html+'</p>';
    localStorage.setItem('bilan_ai_'+dk(currentMonday),JSON.stringify({html:finalHtml,ts:Date.now()}));
    document.getElementById('ai-result').innerHTML=finalHtml;document.getElementById('ai-result').style.display='block';btn.textContent='Regénérer';
  }catch(err){document.getElementById('ai-result').innerHTML='<span style="color:#EF4444;">Erreur réseau.</span>';document.getElementById('ai-result').style.display='block';}
  document.getElementById('ai-loader').style.display='none';btn.disabled=false;
}
